<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uninstalling MASKING.exe</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #05080a;
  --term:    #090d10;
  --green:   #4dffa0;
  --gdim:    #d459ff;
  --cyan:    #00d9f5;
  --white:   #d8e8de;
  --amber:   #ffb833;
  --red:     #ff4f6e;
  --fuchsia: #ff2bd6;
  --blue:    #5ab8ff;
  --orange:  #ff9100;
}

body {
  background: var(--bg);
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: clamp(18px, 5vh, 48px) clamp(10px, 4vw, 20px) clamp(36px, 7vh, 60px);
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  overflow-x:hidden;
}

.window {
  width: 100%;
  max-width: min(760px, calc(100vw - 20px));
  border-radius: 11px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 50px 120px rgba(0,0,0,0.85),
    0 0 100px rgba(77,255,160,0.04);
}

.titlebar {
  background: #111918;
  padding: 13px 18px;
  display: flex;
  align-items: center;
  gap: 9px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  user-select: none;
}

.dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.dot.r { background:#ff5f57; }
.dot.y { background:#ffbd2e; }
.dot.g { background:#28c840; }

.title-label {
  flex:1;
  text-align:center;
  color:#5d2b58;
  font-size:clamp(14px, 2.5vw, 18px);
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow:0 0 18px rgba(255,43,214,.22);
}

.progress-dock {
  background:#0b1112;
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding: 12px 18px 13px;
}

.progress-head {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:8px;
}

.progress-title {
  color:var(--fuchsia);
  font-size:clamp(16px, 3vw, 20px);
  font-weight:700;
  letter-spacing:2.4px;
  text-transform:uppercase;
  text-shadow:0 0 22px rgba(255,43,214,.55);
}

.progress-pct {
  color:var(--cyan);
  min-width:4ch;
  text-align:right;
  font-size:clamp(16px, 3vw, 20px);
  font-weight:700;
  text-shadow:0 0 18px rgba(0,217,245,.42);
}

.progress-track {
  height:8px;
  padding:1px;
  border:1px solid rgba(77,255,160,.2);
  background:#05080a;
  box-shadow:inset 0 0 18px rgba(0,0,0,.8);
}

.progress-fill {
  width:0%;
  height:100%;
  background:linear-gradient(90deg, var(--fuchsia), var(--cyan), var(--green));
  box-shadow:0 0 18px rgba(255,43,214,.35);
  transition:width .2s linear;
}

.term {
  background: var(--term);
  padding: clamp(22px, 4vw, 32px) clamp(16px, 5vw, 38px) clamp(110px, 15vh, 160px);
  min-height: min(65vh, 680px);
  min-height: min(65svh, 680px);
  max-height: calc(100vh - 92px);
  max-height: calc(100svh - 92px);
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines overlay */
.term::after {
  content:'';
  position:fixed; top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.045) 3px, rgba(0,0,0,0.045) 4px
  );
  pointer-events:none;
  z-index:99;
}

.term::-webkit-scrollbar { width:3px; }
.term::-webkit-scrollbar-track { background:transparent; }
.term::-webkit-scrollbar-thumb { background:var(--gdim); border-radius:2px; }

#out {
  position:relative;
  z-index:3;
}

/* ── Base line ── */
.L {
  font-size:clamp(24px, 4vw, 28px);
  line-height:1.75;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  position:relative;
  z-index:3;
  animation: slide-in 0.14s ease-out;
}
@keyframes slide-in {
  from { opacity:0; transform:translateX(-4px); }
  to   { opacity:1; transform:translateX(0); }
}

/* ── Type classes ── */
.L.h    { color:var(--cyan); font-weight:700; font-size:clamp(26px, 4.5vw, 30px); letter-spacing:1px;
          text-shadow:0 0 28px rgba(0,217,245,.45),0 0 56px rgba(0,217,245,.15); }
.L.mask {
  color:var(--fuchsia);
  font-weight:700;
  font-size:clamp(40px, 7vw, 48px);
  line-height:1.35;
  letter-spacing:clamp(2.6px, .68vw, 5px);
  text-transform:uppercase;
  text-shadow:
    0 0 22px rgba(255,43,214,.8),
    0 0 58px rgba(255,43,214,.45),
    0 0 110px rgba(255,43,214,.2);
}
.L.info { color:var(--white); font-weight:300; opacity:.72; }
.L.n    { color:var(--cyan); text-shadow:0 0 10px rgba(0,217,245,.2); }
.L.d    { color:var(--gdim); }
.L.sep  { color:var(--gdim); opacity:.28; }
.L.wh   { color:var(--amber); font-weight:600; text-shadow:0 0 22px rgba(255,184,51,.4); }
.L.w    { color:var(--amber); text-shadow:0 0 14px rgba(255,184,51,.25); }
.L.p    { color:var(--white); }
.L.inp  { color:#fff; font-weight:600; }
.L.mod  { color:var(--green); opacity:.78; }
.L.suc  { color:var(--green); }
.L.frc  { color:var(--red); font-weight:700; text-shadow:0 0 18px rgba(255,79,110,.4); }
.L.rst  { color:var(--blue); }
.L.rmv  { color:var(--orange); }
.L.ina  { color:#749c87; }
.L.prg  { color:var(--cyan); text-shadow:0 0 16px rgba(0,217,245,.4); font-size:clamp(24px, 4vw, 28px); }
.L.new  { color:#8effc0; text-shadow:0 0 14px rgba(142,255,192,.3); }
.L.com  { color:var(--cyan); font-weight:700; font-size:clamp(26px, 4.5vw, 30px); letter-spacing:clamp(1.5px, .4vw, 3px);
          text-shadow:0 0 40px rgba(0,217,245,.55),0 0 80px rgba(0,217,245,.2); }
.L.stb  { color:#00ff99; font-weight:700; text-shadow:0 0 26px rgba(0,255,153,.55); }
.L.wel  { color:#fff; font-weight:700; font-size:clamp(12px, 2.2vw, 16px); line-height:1.12; letter-spacing:0;
          text-shadow:0 0 20px rgba(255,255,255,.55),0 0 42px rgba(255,43,214,.25);
          margin-top:4px; max-width:100%; white-space:pre; overflow-wrap:normal; }
.L.sig  { color:#7ab59a; font-size:16px; letter-spacing:1px; opacity:.78; }
.L.fin  { color:#ffffff; font-weight:700; font-size:clamp(26px, 4.5vw, 30px); text-shadow:0 0 10px #ffffff, 0 0 30px var(--fuchsia), 0 0 60px var(--cyan); letter-spacing:1px; }

/* ── Inline tags ── */
.ok   { color:#00ff88; font-weight:700; }
.fok  { color:var(--red); font-weight:700; }
.rok  { color:var(--orange); font-weight:600; }
.rstr { color:var(--blue); font-weight:600; }
.inak { color:#415a4d; }
.ambs { color:var(--amber); }
.maskref { color:var(--fuchsia); font-weight:700; text-shadow:0 0 20px rgba(255,43,214,.7); }
.grn  { color:#00ff88; }
.core-char { display:inline-block; min-width:1.25ch; color:var(--fuchsia); text-shadow:0 0 18px rgba(255,43,214,.65); transition:color .18s ease, opacity .18s ease, transform .18s ease; }
.core-char.drop { color:#39213a; opacity:.45; text-shadow:none; transform:translateY(1px); }
.core-noise { color:#ff8cf0; opacity:.75; }

.heart-bloom {
  height:162px;
  position:relative;
  z-index:4;
  margin-top:8px;
  overflow:visible;
}

.particle {
  position:absolute;
  left:var(--x, 50%);
  bottom:0;
  color:var(--c, var(--fuchsia));
  font-size:var(--s, 13px);
  opacity:0;
  font-weight:700;
  text-shadow:0 0 14px currentColor;
  animation:particle-rise var(--dur, 3.5s) ease-out 3 forwards;
  animation-delay:var(--delay, 0s);
}

.particle.dot {
  width:var(--s, 6px);
  height:var(--s, 6px);
  border-radius:50%;
  background:currentColor;
  font-size:0;
}

@keyframes particle-rise {
  0% { opacity:0; transform:translate(-50%, 22px) scale(.58) rotate(var(--r0, -12deg)); }
  14% { opacity:.95; }
  54% { opacity:.8; }
  100% { opacity:0; transform:translate(calc(-50% + var(--drift, 0px)), var(--rise, -138px)) scale(var(--end, 1.55)) rotate(var(--r1, 18deg)); }
}

.fireworks-show {
  height:0;
  position:relative;
  overflow:visible;
  pointer-events:none;
  z-index:1;
}

.firework-spark {
  position:absolute;
  left:var(--x);
  top:var(--y);
  color:var(--c);
  font-size:var(--s, 13px);
  font-weight:700;
  opacity:0;
  text-shadow:0 0 12px currentColor, 0 0 26px currentColor;
  animation:firework-pop var(--dur, 2.2s) ease-out 5 forwards;
  animation-delay:var(--delay, 0s);
}

@keyframes firework-pop {
  0% { opacity:0; transform:translate(-50%, -50%) scale(.2); }
  12% { opacity:1; transform:translate(-50%, -50%) scale(1.25); }
  100% { opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.72) rotate(var(--rot, 90deg)); }
}

.final-safe-space { height:clamp(160px, 25vh, 220px); }

/* ── Blinking cursor ── */
.cursor {
  display:inline-block;
  width:7px; height:13px;
  background:var(--green);
  margin-left:2px;
  vertical-align:text-bottom;
  animation:blink 1s step-end infinite;
  border-radius:1px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

@media (max-width: 560px) {
  body { padding: 18px 8px 34px; }
  .window { border-radius:8px; max-width:calc(100vw - 16px); }
  .titlebar { padding: 11px 12px; gap:7px; }
  .dot { width:10px; height:10px; }
  .title-label { font-size:clamp(12px, 3.5vw, 14px); letter-spacing:1.5px; }
  .progress-dock { padding: 10px 12px 11px; }
  .progress-head { gap:10px; }
  .progress-title { font-size:clamp(14px, 4vw, 16px); letter-spacing:1.5px; }
  .progress-pct { font-size:clamp(14px, 4vw, 16px); }
  .term { padding: 22px 13px 110px; min-height:calc(100svh - 122px); max-height:calc(100svh - 82px); }
  .L { font-size:clamp(20px, 5.5vw, 24px); line-height:1.75; }
  .L.h { font-size:22px; letter-spacing:1px; }
  .L.mask { font-size:clamp(34px, 9vw, 40px); letter-spacing:2px; }
  .L.wel { font-size:clamp(8px, 2.4vw, 10px); line-height:1.08; }
  .heart-bloom { height:148px; }
  .fireworks-show { height:0; }
  .final-safe-space { height:200px; }
}

@media (max-width: 380px) {
  .term { padding-left:10px; padding-right:10px; }
  .L { font-size:10px; }
  .L.mask { font-size:18px; letter-spacing:1.8px; }
  .L.wel { font-size:6.2px; }
}
</style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div class="title-label">terminal — MASKING.exe — uninstall</div>
  </div>
  <div class="progress-dock" aria-label="Total uninstall progress">
    <div class="progress-head">
      <div class="progress-title">uninstalling masking</div>
      <div class="progress-pct" id="totalPct">0%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="totalFill"></div>
    </div>
  </div>
  <div class="term" id="term">
    <div id="out"></div>
    <span class="cursor" id="cur"></span>
  </div>
</div>

<audio id="bgm" src="masking_consola.mp3" preload="auto" autoplay loop></audio>

<script>
const out  = document.getElementById('out');
const term = document.getElementById('term');
const cur  = document.getElementById('cur');
const bgm  = document.getElementById('bgm');
const totalFill = document.getElementById('totalFill');
const totalPct  = document.getElementById('totalPct');

let T = 0;  // global delay accumulator (ms from page load)
let startedAt = 0;
let progressTimer;
const ANIMATION_DELAY = 4000;
const SPEED = 2.4;
const INTRO_SLOW_UNTIL = 7000;
const INTRO_SPEED = 2.8;
const P = 36; // character padding for aligned status columns

/* ────────────────────────────── helpers ── */

function q(fn, d = 110) {
  T += d * (T < INTRO_SLOW_UNTIL ? INTRO_SPEED : SPEED);
  setTimeout(fn, ANIMATION_DELAY + T);
}

function startMusic() {
  if (!bgm) return;
  bgm.volume = 0.42;
  const attempt = bgm.play();
  if (attempt) attempt.catch(() => {});
}

function startProgress(totalDuration) {
  startedAt = performance.now();
  progressTimer = setInterval(() => {
    const pct = Math.min(100, Math.round(((performance.now() - startedAt) / totalDuration) * 100));
    totalFill.style.width = pct + '%';
    totalPct.textContent = pct + '%';
    if (pct >= 100) clearInterval(progressTimer);
  }, 180);
}

startMusic();
document.addEventListener('pointerdown', startMusic, { once:true });
document.addEventListener('keydown', startMusic, { once:true });

function scroll() { term.scrollTop = term.scrollHeight; }

function addEl(el) { out.appendChild(el); scroll(); }

// Plain-text line
function L(text, cls, pause = 115) {
  q(() => {
    const d = document.createElement('div');
    d.className = `L ${cls}`;
    d.textContent = text;
    addEl(d);
  }, pause);
}

function TYPE(text, cls, pause = 115, charDelay = 42) {
  q(() => {
    const d = document.createElement('div');
    d.className = `L ${cls}`;
    addEl(d);
    let i = 0;
    const typer = setInterval(() => {
      d.textContent = text.slice(0, i + 1);
      i += 1;
      scroll();
      if (i >= text.length) clearInterval(typer);
    }, charDelay);
  }, pause);
  T += text.length * charDelay;
}

// HTML line (for coloured inline spans)
function H(html, cls, pause = 115) {
  q(() => {
    const d = document.createElement('div');
    d.className = `L ${cls}`;
    d.innerHTML = html;
    addEl(d);
  }, pause);
}

// Empty spacer
function blank(pause = 90) {
  q(() => {
    const d = document.createElement('div');
    d.className = 'L d';
    d.innerHTML = '\u00a0'; // &nbsp;
    addEl(d);
  }, pause);
}

// Separator line
function sep(pause = 220) {
  L('─'.repeat(P + 4), 'sep', pause);
}

// Padded status line: label ........ [TAG]
function SL(label, tag, tagCls, pause = 285) {
  q(() => {
    const d = document.createElement('div');
    d.className = 'L suc';
    d.innerHTML = label.padEnd(P, ' ') + `<span class="${tagCls}">[${tag}]</span>`;
    addEl(d);
  }, pause);
}

// "User input" line — types the char after a brief pause
function INP(text, pause = 900) {
  q(() => {
    const d = document.createElement('div');
    d.className = 'L inp';
    d.textContent = '> ';
    addEl(d);
    setTimeout(() => { d.textContent = text; scroll(); }, 520);
  }, pause);
}

/* ────────────────────────────── sequence ── */

// — Init —
L('MASKING.EXE', 'mask', 0);
TYPE('INITIALIZING UNINSTALL PROCESS...', 'h', 360, 48);
blank(420);
H(`<span style="color:#7ab59a">target:</span>           <span class="maskref">MASKING.exe</span>`, 'info', 300);
H(`<span style="color:#7ab59a">status:</span>           <span class="ambs">active</span>`, 'info', 160);
H(`<span style="color:#7ab59a">permission level:</span> <span class="grn">granted</span>`, 'info', 160);

sep(470);
blank(210);

L('scanning behavioral architecture...', 'd', 360);
L('scanning adaptive responses...', 'd', 500);
L('scanning emotional suppression layers...', 'd', 520);

blank(430);
L('MODULES DETECTED:', 'n', 310);
blank(160);

[
  'people_pleasing.dll',
  'forced_smile.pkg',
  'social_camouflage.sys',
  'hypervigilance.exe',
  'approval_seeking.ai',
  'emotional_muting.cfg',
  'conflict_avoidance.dll',
  'identity_fragmentation.pkg',
  'overexplaining.exe',
  'performative_personality.sys',
  'validation_dependency.ai',
  'automatic_mirroring.dll',
  'survival_mode.exe',
  'shame_response.pkg',
  'self_abandonment.sys',
].forEach(m => L(`  - ${m}`, 'mod', 410));

blank(320);
sep(470);
blank(360);

L('BEGIN UNINSTALL? [Y/N]', 'p', 750);
blank(160);
INP('> Y', 1300);

blank(260);
sep(320);
blank(230);

// — Stop processes —
L('STOPPING ACTIVE PROCESSES...', 'n', 360);
blank(160);
L('terminating:', 'd', 260);

SL('  - performative_personality.sys', 'OK', 'ok', 350);
SL('  - approval_seeking.ai',          'OK', 'ok', 320);
SL('  - automatic_mirroring.dll',      'OK', 'ok', 350);

blank(520);
L('WARNING:', 'wh', 580);
L('  hypervigilance.exe resisting shutdown...', 'w', 390);
blank(210);
L('FORCE TERMINATE? [Y/N]', 'p', 780);
blank(160);
INP('> Y', 1150);
blank(190);

q(() => {
  const d = document.createElement('div');
  d.className = 'L frc';
  d.innerHTML = '  hypervigilance.exe'.padEnd(P, ' ') + '<span class="fok">[FORCED]</span>';
  addEl(d);
}, 580);

blank(470);
sep(440);
blank(260);

// — External validation —
L('DISCONNECTING EXTERNAL VALIDATION...', 'n', 370);
blank(160);
L('unlinking:', 'd', 260);

SL('  - audience_feedback.loop',   'OK', 'ok', 310);
SL('  - social_acceptance.api',    'OK', 'ok', 290);
SL('  - fear_of_rejection.module', 'OK', 'ok', 310);

blank(230);
L('external dependency reduced.', 'd', 390);

blank(330);
sep(440);
blank(260);

// — Emotional suppression —
L('REMOVING EMOTIONAL SUPPRESSION...', 'n', 370);
blank(160);
L('deleting:', 'd', 260);

SL('  - emotional_muting.cfg',   'OK', 'ok', 310);
SL('  - forced_smile.pkg',       'OK', 'ok', 290);
SL('  - conflict_avoidance.dll', 'OK', 'ok', 310);

blank(340);
L('RESTORING EMOTIONAL RANGE...', 'd', 450);
blank(160);
L('STATUS:', 'd', 210);

['sadness', 'anger', 'vulnerability', 'authenticity'].forEach(e => {
  q(() => {
    const label = '  - ' + e;
    const d = document.createElement('div');
    d.className = 'L rst';
    d.innerHTML = label.padEnd(P, ' ') + '<span class="rstr">[RESTORED]</span>';
    addEl(d);
  }, 370);
});

blank(360);
sep(460);
blank(260);

// — Identity overlays —
L('REMOVING IDENTITY OVERLAYS...', 'n', 370);
blank(160);
L('uninstalling:', 'd', 260);

SL('  - social_camouflage.sys',   'OK', 'ok', 310);
SL('  - adaptive_mask.interface', 'OK', 'ok', 310);

['A', 'B', 'C'].forEach(v => {
  q(() => {
    const label = `  - personality_template_${v}`;
    const d = document.createElement('div');
    d.className = 'L rmv';
    d.innerHTML = label.padEnd(P, ' ') + '<span class="rok">[REMOVED]</span>';
    addEl(d);
  }, 320);
});

blank(470);
L('WARNING:', 'wh', 580);
L('  core identity signature unstable...', 'w', 390);
blank(210);
L('rebuilding authentic profile...', 'd', 720);

blank(370);
sep(460);
blank(260);

// — Trauma responses —
L('CLEANING TRAUMA RESPONSES...', 'n', 370);
blank(160);
L('detected remnants:', 'd', 260);
L('  - shame_response.pkg',    'mod', 210);
L('  - self_abandonment.sys',  'mod', 200);
L('  - survival_mode.exe',     'mod', 200);
blank(290);
L('removing...', 'd', 390);
blank(210);

q(() => {
  const d = document.createElement('div');
  d.className = 'L prg';
  const chars = 'MASKING.exe'.split('').map(ch => `<span class="core-char">${ch}</span>`).join('');
  d.innerHTML = `  core: ${chars}  <span class="core-noise">/ unlinking</span>`;
  addEl(d);

  const nodes = d.querySelectorAll('.core-char');
  nodes.forEach((node, i) => {
    setTimeout(() => {
      node.classList.add('drop');
      if (i === nodes.length - 1) {
        d.innerHTML = '  core: <span class="core-noise">MASKING.exe signature dissolved</span>';
      }
      scroll();
    }, 240 + i * 170);
  });
}, 520);

T += 2300;

// Animated progress bar (single element, updates in place)
q(() => {
  const d = document.createElement('div');
  d.className = 'L prg';
  d.textContent = '  ░░░░░░░░░░   0%';
  addEl(d);
  [
    ['████░░░░░░', ' 40%',  350],
    ['██████░░░░', ' 60%',  750],
    ['███████░░░', ' 73%', 1150],
    ['████████░░', ' 84%', 1550],
    ['█████████░', ' 96%', 1950],
    ['██████████', '100%', 2350],
  ].forEach(([bar, pct, delay]) => {
    setTimeout(() => {
      d.textContent = `  ${bar}  ${pct}`;
      scroll();
    }, delay);
  });
}, 520);

T += 3900; // let animation finish before continuing

blank(380);

  const glyphs = ['✦', '*', '+', '·'];
  const sparks = [];
  centers.forEach(([x, y, baseDelay], ci) => {
    for (let i = 0; i < 18; i++) {
      const angle = (Math.PI * 2 * i) / 18;
      const radius = 42 + ((i + ci) % 4) * 13;
      const dx = Math.round(Math.cos(angle) * radius);
      const dy = Math.round(Math.sin(angle) * radius);
      const color = colors[(i + ci) % colors.length];
      const glyph = glyphs[(i + ci) % glyphs.length];
      const size = 10 + ((i * 3 + ci) % 10);
      sparks.push(`<span class="firework-spark" style="--x:${x};--y:${y};--dx:${dx}px;--dy:${dy}px;--c:${color};--s:${size}px;--delay:calc(${baseDelay} + ${i * 0.018}s);--dur:${2.05 + ci * 0.18}s;--rot:${i * 24}deg;">${glyph}</span>`);

  });
  const show = document.createElement('div');
  show.className = 'fireworks-show';
  show.innerHTML = sparks.join('');
  addEl(show);
}, 360);
